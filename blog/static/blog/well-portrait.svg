<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 960" role="img" aria-labelledby="title desc">
  <title id="title">자화상 우물 일러스트</title>
  <desc id="desc">달과 구름이 비치는 우물 위로 한 사람의 그림자가 보이는 장면</desc>
