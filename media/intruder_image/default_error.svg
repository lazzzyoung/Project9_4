<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Default image placeholder</title>
  <desc id="desc">A neutral placeholder image shown when no uploaded post image is available.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f2eee8"/>
      <stop offset="100%" stop-color="#ddd4c8"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" fill="url(#bg)"/>
  <rect x="56" y="56" width="848" height="428" rx="24" fill="none" stroke="#b8aa99" stroke-width="8"/>
  <path d="M120 412 300 248l110 108 138-146 292 202" fill="none" stroke="#b8aa99" stroke-linecap="round" stroke-linejoin="round" stroke-width="12"/>
  <circle cx="290" cy="188" r="38" fill="#b8aa99"/>
  <text x="480" y="458" fill="#7d6f60" font-family="Arial, sans-serif" font-size="34" text-anchor="middle">
    Upload an image for this post
  </text>
</svg>
